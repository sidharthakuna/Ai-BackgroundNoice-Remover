<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Noise Remover</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="">
</head>
<body>
    <main id="box">
        <h1>🎵 AI Noise Remover</h1>

        <p class="subtitle">
            Remove background noise from audio files using AI
        </p>

        <label for="fileInput" class="upload-area">
            <span class="upload-icon">🎵</span>
            <span id="fileName">Choose an audio file</span>
        </label>

        <input type="file" id="fileInput" accept="audio/*" hidden>

        <button id="uploadBtn">
            Enhance Audio
        </button>

        <div id="status">Ready</div>

        <div id="downloadArea"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
